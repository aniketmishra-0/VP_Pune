<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Splash Screen Generator</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #1a1a2e; color: #fff; }
    h1 { color: #6b8cff; }
    .output { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 20px; }
    .output a { color: #6b8cff; display: block; margin: 4px 0; }
    canvas { display: none; }
    button { padding: 12px 24px; background: #4e74e6; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    button:hover { background: #3a56c5; }
    #status { margin-top: 16px; }
  </style>
</head>
<body>
  <h1>iOS PWA Splash Screen Generator</h1>
  <p>Click the button below to generate splash screens for all iOS device sizes.</p>
  <button onclick="generateAll()">Generate All Splash Screens</button>
  <div id="status"></div>
  <div class="output" id="output"></div>

  <script>
    // All iOS device splash screen sizes (portrait only for simplicity)
    const sizes = [
      // iPhone 16 Pro Max
      { w: 1320, h: 2868, name: 'splash-1320x2868' },
      // iPhone 16 Pro
      { w: 1206, h: 2622, name: 'splash-1206x2622' },
      // iPhone 16 Plus, 15 Plus, 15 Pro Max, 14 Pro Max
      { w: 1290, h: 2796, name: 'splash-1290x2796' },
      // iPhone 16, 15, 15 Pro, 14 Pro
      { w: 1179, h: 2556, name: 'splash-1179x2556' },
      // iPhone 14 Plus, 13 Pro Max, 12 Pro Max
      { w: 1284, h: 2778, name: 'splash-1284x2778' },
      // iPhone 14, 13, 13 Pro, 12, 12 Pro
      { w: 1170, h: 2532, name: 'splash-1170x2532' },
      // iPhone 13 mini, 12 mini
      { w: 1080, h: 2340, name: 'splash-1080x2340' },
      // iPhone 11 Pro Max, XS Max
      { w: 1242, h: 2688, name: 'splash-1242x2688' },
      // iPhone 11, XR
      { w: 828, h: 1792, name: 'splash-828x1792' },
      // iPhone 11 Pro, XS, X
      { w: 1125, h: 2436, name: 'splash-1125x2436' },
      // iPhone 8 Plus, 7 Plus, 6s Plus
      { w: 1242, h: 2208, name: 'splash-1242x2208' },
      // iPhone 8, 7, 6s, SE2
      { w: 750, h: 1334, name: 'splash-750x1334' },
      // iPhone SE 1st gen
      { w: 640, h: 1136, name: 'splash-640x1136' },
      // iPad Pro 12.9"
      { w: 2048, h: 2732, name: 'splash-2048x2732' },
      // iPad Pro 11"
      { w: 1668, h: 2388, name: 'splash-1668x2388' },
      // iPad Pro 10.5"
      { w: 1668, h: 2224, name: 'splash-1668x2224' },
      // iPad Air / iPad 10.2"
      { w: 1620, h: 2160, name: 'splash-1620x2160' },
      // iPad Mini
      { w: 1536, h: 2048, name: 'splash-1536x2048' },
    ];

    function drawSplash(canvas, w, h, logoImg) {
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      const scale = Math.min(w, h) / 1170; // Base scale factor

      // Background gradient
      const grad = ctx.createRadialGradient(w * 0.4, h * 0.35, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
      grad.addColorStop(0, '#a8c0ff');
      grad.addColorStop(0.3, '#7b9df5');
      grad.addColorStop(0.6, '#5f85ec');
      grad.addColorStop(1, '#4468d0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Subtle light overlay at top
      const topGrad = ctx.createLinearGradient(0, 0, 0, h * 0.4);
      topGrad.addColorStop(0, 'rgba(180, 200, 255, 0.3)');
      topGrad.addColorStop(1, 'rgba(180, 200, 255, 0)');
      ctx.fillStyle = topGrad;
      ctx.fillRect(0, 0, w, h * 0.4);

      const centerX = w / 2;
      const centerY = h * 0.42;

      // Logo container (white rounded square)
      const boxSize = 120 * scale;
      const boxRadius = 28 * scale;
      const boxX = centerX - boxSize / 2;
      const boxY = centerY - boxSize / 2;

      // Outer glow
      ctx.save();
      ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
      ctx.shadowBlur = 40 * scale;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      // Outer border (glassmorphic)
      const outerPad = 6 * scale;
      ctx.beginPath();
      roundRect(ctx, boxX - outerPad, boxY - outerPad, boxSize + outerPad * 2, boxSize + outerPad * 2, boxRadius + 4 * scale);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.fill();
      ctx.restore();

      // White container
      ctx.beginPath();
      roundRect(ctx, boxX, boxY, boxSize, boxSize, boxRadius);
      ctx.fillStyle = '#f5f5f5';
      ctx.fill();

      // Draw the logo
      if (logoImg) {
        const logoSize = 85 * scale;
        ctx.drawImage(logoImg, centerX - logoSize / 2, centerY - logoSize / 2, logoSize, logoSize);
      }

      // Title text
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(30, 40, 70, 0.9)';
      ctx.font = `700 ${Math.round(26 * scale)}px "Space Grotesk", "Inter", system-ui, sans-serif`;
      ctx.fillText('Pimpri PW Vidyapeeth', centerX, centerY + boxSize / 2 + 50 * scale);

      // Subtitle
      ctx.fillStyle = 'rgba(50, 60, 100, 0.7)';
      ctx.font = `500 ${Math.round(15 * scale)}px "Space Grotesk", "Inter", system-ui, sans-serif`;
      ctx.fillText('Student Performance Hub', centerX, centerY + boxSize / 2 + 80 * scale);

      // Dots
      const dotY = centerY + boxSize / 2 + 115 * scale;
      const dotRadius = 4 * scale;
      const dotGap = 16 * scale;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(centerX + i * dotGap, dotY, dotRadius, 0, Math.PI * 2);
        ctx.fillStyle = i === 0 ? 'rgba(60, 80, 140, 0.6)' : 'rgba(60, 80, 140, 0.35)';
        ctx.fill();
      }

      // Footer text
      ctx.fillStyle = 'rgba(50, 60, 100, 0.5)';
      ctx.font = `400 ${Math.round(12 * scale)}px "Space Grotesk", "Inter", system-ui, sans-serif`;
      ctx.fillText('Loading your dashboard…', centerX, h - 60 * scale);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    async function generateAll() {
      const status = document.getElementById('status');
      const output = document.getElementById('output');
      status.textContent = 'Loading logo...';

      // Load the logo
      const logoImg = new Image();
      logoImg.crossOrigin = 'anonymous';
      await new Promise((resolve, reject) => {
        logoImg.onload = resolve;
        logoImg.onerror = reject;
        logoImg.src = '/icons/icon-192.png';
      });

      const canvas = document.createElement('canvas');
      output.innerHTML = '';

      for (let i = 0; i < sizes.length; i++) {
        const { w, h, name } = sizes[i];
        status.textContent = `Generating ${name} (${i + 1}/${sizes.length})...`;

        drawSplash(canvas, w, h, logoImg);

        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${name}.png`;
        a.textContent = `${name} (${w}x${h})`;
        a.click(); // auto-download
        output.appendChild(a);
      }

      status.textContent = '✅ All splash screens generated! Check your downloads folder.';
    }
  </script>
</body>
</html>
