<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0e17" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pune VP" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Pune VP" />

    <!-- iOS PWA splash screens (portrait) – matches the in-app splash design -->
    <link rel="apple-touch-startup-image" href="/splash/1320x2868.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="/splash/1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="/splash/1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="/splash/2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="/splash/1620x2160.png" media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />



    <script>
      // Register the service worker for installability + offline fallback.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
      // Honour the user's saved theme as early as possible so the splash
      // screen matches the in-app palette (no flash of light/dark mode).
      try {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <style>
      /* ---------- Splash / loading screen ---------- */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: radial-gradient(circle at 30% 20%, #6b8cff 0%, #4e74e6 45%, #3a56c5 100%);
        color: #fff;
        font-family: "Space Grotesk", "Inter", system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
        transition: opacity 0.45s ease, visibility 0.45s ease;
        overflow: hidden;
      }
      html.dark #app-splash {
        background: radial-gradient(circle at 30% 20%, #1e2a52 0%, #0f1530 45%, #0c0e17 100%);
      }
      #app-splash.splash-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      /* Soft floating orbs in the background */
      #app-splash::before,
      #app-splash::after {
        content: "";
        position: absolute;
        border-radius: 9999px;
        filter: blur(60px);
        opacity: 0.35;
        pointer-events: none;
        animation: splash-float 8s ease-in-out infinite;
      }
      #app-splash::before {
        width: 260px;
        height: 260px;
        background: #ffffff;
        top: -60px;
        left: -60px;
      }
      #app-splash::after {
        width: 320px;
        height: 320px;
        background: #a5b8ff;
        bottom: -80px;
        right: -80px;
        animation-delay: -3s;
      }
      @keyframes splash-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%      { transform: translate(20px, -30px) scale(1.08); }
      }

      .splash-logo-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.2);
        animation: splash-pulse 2.4s ease-in-out infinite;
        overflow: hidden;
      }
      .splash-logo img {
        width: 72px;
        height: 72px;
        object-fit: contain;
      }
      .splash-logo-fallback {
        font-weight: 900;
        font-size: 30px;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #5277f7, #3a56c5);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .splash-ring {
        position: absolute;
        inset: -8px;
        border-radius: 28px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        animation: splash-spin 1.1s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }

      .splash-title {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.3px;
        line-height: 1.25;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
      }
      .splash-subtitle {
        margin: 6px 0 0;
        font-size: 13.5px;
        font-weight: 500;
        opacity: 0.85;
        letter-spacing: 0.2px;
      }

      .splash-dots {
        display: inline-flex;
        gap: 6px;
        margin-top: 4px;
      }
      .splash-dots span {
        width: 7px;
        height: 7px;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.85);
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40%           { transform: translateY(-6px); opacity: 1; }
      }

      .splash-footer {
        position: absolute;
        bottom: max(20px, env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        font-size: 11.5px;
        opacity: 0.7;
        letter-spacing: 0.4px;
      }

      /* Respect users who prefer reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .splash-ring,
        .splash-logo,
        .splash-dots span,
        #app-splash::before,
        #app-splash::after {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Splash shown until React mounts. Removed automatically by main.tsx. -->
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading Pune Vidyapeeth">
      <div class="splash-logo-wrap">
        <div class="splash-ring"></div>
        <div class="splash-logo">
          <img
            src="/icons/icon-192.webp"
            alt="PW Vidyapeeth"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"
          />
          <span class="splash-logo-fallback" style="display:none;">PW</span>
        </div>
      </div>
      <div>
        <h1 class="splash-title">Pune Vidyapeeth</h1>
        <p class="splash-subtitle">Student Performance Hub</p>
      </div>
      <div class="splash-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="splash-footer">Loading your dashboard…</div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
